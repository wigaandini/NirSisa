[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Fase 1 — Unit test komponen AI dan utilitas
    integration: Fase 2 — Integration test API endpoints
    performance: Fase 3 — Performance dan latency benchmarks
    evaluation: Evaluasi model — Precision, Recall, F1, SPI Accuracy
    requires_model: Membutuhkan file .pkl (skip jika tidak ada)